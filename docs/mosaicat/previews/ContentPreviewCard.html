<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ContentPreviewCard Preview</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { margin: 0; padding: 16px; background: #f8fafc; font-family: system-ui, -apple-system, sans-serif; }
  </style>
</head>
<body>
  <div class="w-full max-w-sm mx-auto">
    <!-- Phone-style frame -->
    <div class="bg-white rounded-xl border border-gray-200 shadow-sm overflow-hidden">
      <!-- Header bar -->
      <div class="flex items-center justify-between px-4 py-3 border-b border-gray-100">
        <div class="flex items-center gap-2">
          <div class="w-8 h-8 rounded-full bg-gradient-to-br from-rose-400 to-pink-500 flex items-center justify-center">
            <span class="text-white text-xs font-bold">小</span>
          </div>
          <div>
            <p class="text-sm font-semibold text-gray-900 leading-tight">内容预览</p>
            <p class="text-xs text-gray-400">小红书笔记</p>
          </div>
        </div>
        <span class="text-xs text-gray-400 bg-gray-50 px-2 py-0.5 rounded-full">预览模式</span>
      </div>

      <!-- Image placeholder area (simulating 3 images with dots) -->
      <div class="relative aspect-[3/4] bg-gradient-to-br from-pink-50 via-rose-50 to-orange-50 flex flex-col items-center justify-center">
        <!-- Mock image content -->
        <div class="w-full h-full flex items-center justify-center">
          <div class="text-center space-y-3">
            <div class="w-20 h-20 mx-auto rounded-2xl bg-gradient-to-br from-rose-200 to-pink-300 flex items-center justify-center">
              <svg class="w-10 h-10 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1">
                <path stroke-linecap="round" stroke-linejoin="round" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z" />
              </svg>
            </div>
            <p class="text-sm text-rose-300">示例配图区域</p>
          </div>
        </div>
        <!-- Navigation arrows -->
        <button class="absolute left-2 top-1/2 -translate-y-1/2 w-7 h-7 rounded-full bg-black/20 text-white flex items-center justify-center">
          <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7" />
          </svg>
        </button>
        <button class="absolute right-2 top-1/2 -translate-y-1/2 w-7 h-7 rounded-full bg-black/20 text-white flex items-center justify-center">
          <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7" />
          </svg>
        </button>
        <!-- Dot indicators -->
        <div class="absolute bottom-3 left-1/2 -translate-x-1/2 flex gap-1.5">
          <span class="w-1.5 h-1.5 rounded-full bg-white"></span>
          <span class="w-1.5 h-1.5 rounded-full bg-white/50"></span>
          <span class="w-1.5 h-1.5 rounded-full bg-white/50"></span>
        </div>
      </div>

      <!-- Content area -->
      <div class="px-4 py-4 space-y-3">
        <!-- Title -->
        <h3 class="text-base font-bold text-gray-900 leading-snug">
          秋冬必备护肤好物分享｜干皮救星
        </h3>

        <!-- Body text -->
        <p class="text-sm text-gray-600 leading-relaxed">
          姐妹们！这个秋冬我真的被这几款护肤品救了！之前换季的时候脸上起皮、泛红，用了各种大牌都没用。后来朋友推荐了这几款平价好物，坚持用了两周，皮肤状态肉眼可见地变好了！

特别是那个修复面霜，质地很润但不油腻，早晚都能用。搭配精华液效果翻倍，现在出门素颜都有自信了～
        </p>

        <!-- Hashtags -->
        <div class="flex flex-wrap gap-1.5 pt-1">
          <span class="inline-flex items-center text-xs text-blue-600 bg-blue-50 px-2 py-0.5 rounded-full">
            #护肤分享
          </span>
          <span class="inline-flex items-center text-xs text-blue-600 bg-blue-50 px-2 py-0.5 rounded-full">
            #秋冬护肤
          </span>
          <span class="inline-flex items-center text-xs text-blue-600 bg-blue-50 px-2 py-0.5 rounded-full">
            #平价好物
          </span>
          <span class="inline-flex items-center text-xs text-blue-600 bg-blue-50 px-2 py-0.5 rounded-full">
            #干皮护肤
          </span>
          <span class="inline-flex items-center text-xs text-blue-600 bg-blue-50 px-2 py-0.5 rounded-full">
            #素颜也自信
          </span>
        </div>
      </div>

      <!-- Bottom interaction bar -->
      <div class="flex items-center justify-around px-4 py-3 border-t border-gray-100">
        <div class="flex items-center gap-1 text-gray-400">
          <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
            <path stroke-linecap="round" stroke-linejoin="round" d="M21 8.25c0-2.485-2.099-4.5-4.688-4.5-1.935 0-3.597 1.126-4.312 2.733-.715-1.607-2.377-2.733-4.313-2.733C5.1 3.75 3 5.765 3 8.25c0 7.22 9 12 9 12s9-4.78 9-12z" />
          </svg>
          <span class="text-xs">赞</span>
        </div>
        <div class="flex items-center gap-1 text-gray-400">
          <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
            <path stroke-linecap="round" stroke-linejoin="round" d="M11.48 3.499a.562.562 0 011.04 0l2.125 5.111a.563.563 0 00.475.345l5.518.442c.499.04.701.663.321.988l-4.204 3.602a.563.563 0 00-.182.557l1.285 5.385a.562.562 0 01-.84.61l-4.725-2.885a.563.563 0 00-.586 0L6.982 20.54a.562.562 0 01-.84-.61l1.285-5.386a.562.562 0 00-.182-.557l-4.204-3.602a.563.563 0 01.321-.988l5.518-.442a.563.563 0 00.475-.345L11.48 3.5z" />
          </svg>
          <span class="text-xs">收藏</span>
        </div>
        <div class="flex items-center gap-1 text-gray-400">
          <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
            <path stroke-linecap="round" stroke-linejoin="round" d="M12 20.25c4.97 0 9-3.694 9-8.25s-4.03-8.25-9-8.25S3 7.444 3 12c0 2.104.859 4.023 2.273 5.48.432.447.74 1.04.586 1.641a4.483 4.483 0 01-.923 1.785A5.969 5.969 0 006 21c1.282 0 2.47-.402 3.445-1.087.81.22 1.668.337 2.555.337z" />
          </svg>
          <span class="text-xs">评论</span>
        </div>
        <div class="flex items-center gap-1 text-gray-400">
          <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
            <path stroke-linecap="round" stroke-linejoin="round" d="M7.217 10.907a2.25 2.25 0 100 2.186m0-2.186c.18.324.283.696.283 1.093s-.103.77-.283 1.093m0-2.186l9.566-5.314m-9.566 7.5l9.566 5.314m0 0a2.25 2.25 0 103.935 2.186 2.25 2.25 0 00-3.935-2.186zm0-12.814a2.25 2.25 0 103.933-2.185 2.25 2.25 0 00-3.933 2.185z" />
          </svg>
          <span class="text-xs">分享</span>
        </div>
      </div>
    </div>

    <!-- Character count info -->
    <div class="flex justify-between mt-3 px-1">
      <span class="text-xs text-gray-400">标题 15/20</span>
      <span class="text-xs text-gray-400">正文 156/1000</span>
    </div>
  </div>
</body>
</html>
