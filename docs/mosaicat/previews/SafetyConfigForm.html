<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SafetyConfigForm Preview</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { margin: 0; padding: 16px; background: #f8fafc; font-family: system-ui, sans-serif; }
    input[type="range"] { -webkit-appearance: none; appearance: none; height: 6px; background: #e5e7eb; border-radius: 9999px; outline: none; }
    input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; appearance: none; width: 16px; height: 16px; border-radius: 9999px; background: #2563eb; cursor: pointer; }
  </style>
</head>
<body>
  <div class="max-w-2xl mx-auto space-y-6">

    <!-- Header -->
    <div>
      <h2 class="text-2xl font-bold text-gray-900">安全策略配置</h2>
      <p class="text-sm text-gray-600 mt-1">配置发布频率与随机延迟参数，降低平台风控风险</p>
    </div>

    <!-- Account Scope Selector -->
    <div class="bg-white border border-gray-200 rounded-xl p-4">
      <label class="text-sm font-medium text-gray-900 block mb-2">配置范围</label>
      <div class="flex flex-wrap gap-2">
        <button class="px-3 py-1.5 rounded-lg text-sm font-medium bg-blue-600 text-white">全局配置</button>
        <button class="px-3 py-1.5 rounded-lg text-sm font-medium bg-gray-100 text-gray-600 flex items-center gap-1.5">
          <span class="w-2 h-2 rounded-full bg-emerald-400"></span>
          美妆种草号
        </button>
        <button class="px-3 py-1.5 rounded-lg text-sm font-medium bg-gray-100 text-gray-600 flex items-center gap-1.5">
          <span class="w-2 h-2 rounded-full bg-emerald-400"></span>
          穿搭日记
        </button>
        <button class="px-3 py-1.5 rounded-lg text-sm font-medium bg-gray-100 text-gray-600 flex items-center gap-1.5">
          <span class="w-2 h-2 rounded-full bg-amber-400"></span>
          美食探店
        </button>
      </div>
    </div>

    <!-- Risk Banner — Safe -->
    <div class="bg-emerald-50 border border-emerald-200 rounded-xl p-4 flex gap-3">
      <div class="bg-emerald-100 text-emerald-600 w-8 h-8 rounded-lg flex items-center justify-center text-sm font-bold flex-shrink-0">✓</div>
      <div>
        <p class="text-sm font-semibold text-gray-900">当前配置安全</p>
        <p class="text-xs text-gray-600 mt-0.5">发布频率和间隔在安全范围内，被平台风控的概率较低。</p>
      </div>
    </div>

    <!-- Publish Frequency Section -->
    <div class="bg-white border border-gray-200 rounded-xl p-6 space-y-6">
      <h3 class="text-lg font-semibold text-gray-900">发布频率</h3>

      <!-- maxPostsPerDay -->
      <div class="space-y-2">
        <div class="flex items-center justify-between">
          <label class="text-sm font-medium text-gray-900">每日发布上限</label>
          <div class="flex items-center gap-2">
            <input type="number" value="2" class="w-24 rounded-lg border border-gray-200 px-3 py-1.5 text-sm text-gray-900 text-right focus:outline-none" readonly />
            <span class="text-sm text-gray-500 w-12">篇</span>
          </div>
        </div>
        <p class="text-xs text-gray-400">建议不超过 3 篇/天，降低风控概率</p>
        <input type="range" value="2" min="1" max="10" class="w-full" />
        <div class="flex justify-between text-xs text-gray-400">
          <span>1 篇</span>
          <span>10 篇</span>
        </div>
      </div>

      <div class="border-t border-gray-100"></div>

      <!-- minIntervalMinutes -->
      <div class="space-y-2">
        <div class="flex items-center justify-between">
          <label class="text-sm font-medium text-gray-900">最小发布间隔</label>
          <div class="flex items-center gap-2">
            <input type="number" value="120" class="w-24 rounded-lg border border-gray-200 px-3 py-1.5 text-sm text-gray-900 text-right focus:outline-none" readonly />
            <span class="text-sm text-gray-500 w-12">分钟</span>
          </div>
        </div>
        <p class="text-xs text-gray-400">同一账号两次发布之间的最小时间间隔</p>
        <input type="range" value="120" min="30" max="480" step="10" class="w-full" />
        <div class="flex justify-between text-xs text-gray-400">
          <span>30 分钟</span>
          <span>480 分钟</span>
        </div>
      </div>
    </div>

    <!-- Random Delay Section -->
    <div class="bg-white border border-gray-200 rounded-xl p-6 space-y-6">
      <div>
        <h3 class="text-lg font-semibold text-gray-900">随机延迟</h3>
        <p class="text-xs text-gray-400 mt-0.5">模拟人工操作的随机等待时间，避免机械化行为特征</p>
      </div>

      <!-- randomDelayMin -->
      <div class="space-y-2">
        <div class="flex items-center justify-between">
          <label class="text-sm font-medium text-gray-900">最小延迟</label>
          <div class="flex items-center gap-2">
            <input type="number" value="200" class="w-24 rounded-lg border border-gray-200 px-3 py-1.5 text-sm text-gray-900 text-right focus:outline-none" readonly />
            <span class="text-sm text-gray-500 w-12">ms</span>
          </div>
        </div>
        <input type="range" value="200" min="100" max="5000" step="100" class="w-full" />
        <div class="flex justify-between text-xs text-gray-400">
          <span>100 ms</span>
          <span>5000 ms</span>
        </div>
      </div>

      <div class="border-t border-gray-100"></div>

      <!-- randomDelayMax -->
      <div class="space-y-2">
        <div class="flex items-center justify-between">
          <label class="text-sm font-medium text-gray-900">最大延迟</label>
          <div class="flex items-center gap-2">
            <input type="number" value="2000" class="w-24 rounded-lg border border-gray-200 px-3 py-1.5 text-sm text-gray-900 text-right focus:outline-none" readonly />
            <span class="text-sm text-gray-500 w-12">ms</span>
          </div>
        </div>
        <p class="text-xs text-gray-400">最大延迟应大于最小延迟</p>
        <input type="range" value="2000" min="200" max="10000" step="100" class="w-full" />
        <div class="flex justify-between text-xs text-gray-400">
          <span>200 ms</span>
          <span>10000 ms</span>
        </div>
      </div>
    </div>

    <!-- Actions -->
    <div class="flex items-center justify-between">
      <p class="text-xs text-gray-400">上次更新: 2026/3/22 14:30:00</p>
      <div class="flex gap-3">
        <button class="px-4 py-2 rounded-lg text-sm font-medium text-gray-600 bg-gray-100 opacity-40 cursor-not-allowed">重置</button>
        <button class="px-6 py-2 rounded-lg text-sm font-medium text-white bg-blue-600 opacity-40 cursor-not-allowed">保存全局配置</button>
      </div>
    </div>

  </div>
</body>
</html>
