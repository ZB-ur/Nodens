<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ScheduleRuleModal Preview</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { margin: 0; padding: 0; background: #0000004d; font-family: system-ui, -apple-system, sans-serif; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
  </style>
</head>
<body>

  <!-- Modal -->
  <div style="width: 640px; max-height: 90vh;" class="bg-white rounded-xl shadow-xl overflow-y-auto">

    <!-- Header -->
    <div class="flex items-center justify-between px-6 py-4 border-b border-gray-200">
      <div>
        <h2 class="text-xl font-bold text-gray-900">自动排期规则</h2>
        <p class="mt-0.5 text-sm text-gray-500">配置排期规则后自动生成发布计划</p>
      </div>
      <button class="p-2 text-gray-400 hover:text-gray-600 hover:bg-gray-100 rounded-lg">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
        </svg>
      </button>
    </div>

    <div class="p-6 space-y-6">

      <!-- Section 1: Account Selection -->
      <section>
        <div class="flex items-center justify-between mb-3">
          <h3 class="text-sm font-semibold text-gray-900">选择账号</h3>
          <button class="text-xs text-blue-600 hover:text-blue-700 font-medium">全选</button>
        </div>
        <div class="grid grid-cols-2 gap-2">
          <!-- Account 1 - Selected -->
          <button class="flex items-center gap-3 p-3 rounded-lg border border-blue-500 bg-blue-50 ring-1 ring-blue-500 text-left">
            <div class="w-9 h-9 rounded-full bg-gradient-to-br from-pink-400 to-rose-500 flex items-center justify-center text-white text-xs font-bold">美</div>
            <div class="flex-1 min-w-0">
              <p class="text-sm font-medium text-gray-900 truncate">美妆小达人</p>
              <div class="flex items-center gap-1.5 mt-0.5">
                <span class="inline-block w-1.5 h-1.5 rounded-full bg-emerald-500"></span>
                <span class="text-xs text-gray-500">Cookie 有效</span>
              </div>
            </div>
            <svg class="w-5 h-5 text-blue-600 flex-shrink-0" fill="currentColor" viewBox="0 0 20 20">
              <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clip-rule="evenodd" />
            </svg>
          </button>

          <!-- Account 2 - Selected -->
          <button class="flex items-center gap-3 p-3 rounded-lg border border-blue-500 bg-blue-50 ring-1 ring-blue-500 text-left">
            <div class="w-9 h-9 rounded-full bg-gradient-to-br from-violet-400 to-purple-500 flex items-center justify-center text-white text-xs font-bold">穿</div>
            <div class="flex-1 min-w-0">
              <p class="text-sm font-medium text-gray-900 truncate">穿搭日记本</p>
              <div class="flex items-center gap-1.5 mt-0.5">
                <span class="inline-block w-1.5 h-1.5 rounded-full bg-emerald-500"></span>
                <span class="text-xs text-gray-500">Cookie 有效</span>
              </div>
            </div>
            <svg class="w-5 h-5 text-blue-600 flex-shrink-0" fill="currentColor" viewBox="0 0 20 20">
              <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clip-rule="evenodd" />
            </svg>
          </button>

          <!-- Account 3 - Not selected -->
          <button class="flex items-center gap-3 p-3 rounded-lg border border-gray-200 hover:border-gray-300 hover:bg-gray-50 text-left">
            <div class="w-9 h-9 rounded-full bg-gradient-to-br from-amber-400 to-orange-500 flex items-center justify-center text-white text-xs font-bold">生</div>
            <div class="flex-1 min-w-0">
              <p class="text-sm font-medium text-gray-900 truncate">生活好物分享</p>
              <div class="flex items-center gap-1.5 mt-0.5">
                <span class="inline-block w-1.5 h-1.5 rounded-full bg-amber-500"></span>
                <span class="text-xs text-gray-500">Cookie 即将过期</span>
              </div>
            </div>
          </button>

          <!-- Account 4 - Disabled (expired) -->
          <button class="flex items-center gap-3 p-3 rounded-lg border border-gray-200 bg-gray-50 opacity-50 cursor-not-allowed text-left" disabled>
            <div class="w-9 h-9 rounded-full bg-gradient-to-br from-gray-300 to-gray-400 flex items-center justify-center text-white text-xs font-bold">旅</div>
            <div class="flex-1 min-w-0">
              <p class="text-sm font-medium text-gray-900 truncate">旅行vlog</p>
              <div class="flex items-center gap-1.5 mt-0.5">
                <span class="inline-block w-1.5 h-1.5 rounded-full bg-red-500"></span>
                <span class="text-xs text-gray-500">Cookie 已失效</span>
              </div>
            </div>
          </button>
        </div>
      </section>

      <!-- Section 2: Date Range -->
      <section>
        <h3 class="text-sm font-semibold text-gray-900 mb-3">排期日期范围</h3>
        <div class="flex items-center gap-3">
          <div class="flex-1">
            <label class="block text-xs text-gray-500 mb-1">开始日期</label>
            <div class="w-full px-3 py-2 text-sm border border-gray-200 rounded-lg text-gray-900 bg-white">2026-03-25</div>
          </div>
          <span class="text-gray-400 mt-5">至</span>
          <div class="flex-1">
            <label class="block text-xs text-gray-500 mb-1">结束日期</label>
            <div class="w-full px-3 py-2 text-sm border border-gray-200 rounded-lg text-gray-900 bg-white">2026-03-31</div>
          </div>
        </div>
      </section>

      <!-- Section 3: Posts Per Day -->
      <section>
        <h3 class="text-sm font-semibold text-gray-900 mb-3">每日发布篇数</h3>
        <div class="flex items-center gap-3">
          <button class="flex-1 py-2.5 text-sm font-medium rounded-lg border border-gray-200 text-gray-600 hover:border-gray-300">
            1 篇/天
          </button>
          <button class="flex-1 py-2.5 text-sm font-medium rounded-lg border border-blue-500 bg-blue-50 text-blue-700 ring-1 ring-blue-500">
            2 篇/天
          </button>
        </div>
        <p class="mt-2 text-xs text-gray-400">安全策略限制：每日最多 2 篇，间隔 ≥ 120 分钟</p>
      </section>

      <!-- Section 4: Time Slots -->
      <section>
        <h3 class="text-sm font-semibold text-gray-900 mb-3">发布时段</h3>
        <div class="flex flex-wrap gap-2 mb-3">
          <!-- 08:00 -->
          <button class="inline-flex items-center gap-1.5 px-3 py-1.5 text-sm rounded-lg border border-gray-200 text-gray-600">
            <span class="font-medium">08:00</span>
            <span class="text-xs px-1.5 py-0.5 rounded border bg-amber-50 text-amber-700 border-amber-200">早间通勤</span>
          </button>
          <!-- 10:00 - Selected -->
          <button class="inline-flex items-center gap-1.5 px-3 py-1.5 text-sm rounded-lg border border-blue-500 bg-blue-50 text-blue-700 ring-1 ring-blue-500">
            <span class="font-medium">10:00</span>
            <span class="text-xs px-1.5 py-0.5 rounded border bg-red-50 text-red-700 border-red-200">早间高峰</span>
          </button>
          <!-- 12:00 -->
          <button class="inline-flex items-center gap-1.5 px-3 py-1.5 text-sm rounded-lg border border-gray-200 text-gray-600">
            <span class="font-medium">12:00</span>
            <span class="text-xs px-1.5 py-0.5 rounded border bg-red-50 text-red-700 border-red-200">午间休息</span>
          </button>
          <!-- 15:00 -->
          <button class="inline-flex items-center gap-1.5 px-3 py-1.5 text-sm rounded-lg border border-gray-200 text-gray-600">
            <span class="font-medium">15:00</span>
            <span class="text-xs px-1.5 py-0.5 rounded border bg-amber-50 text-amber-700 border-amber-200">下午茶歇</span>
          </button>
          <!-- 18:00 -->
          <button class="inline-flex items-center gap-1.5 px-3 py-1.5 text-sm rounded-lg border border-gray-200 text-gray-600">
            <span class="font-medium">18:00</span>
            <span class="text-xs px-1.5 py-0.5 rounded border bg-red-50 text-red-700 border-red-200">晚间通勤</span>
          </button>
          <!-- 20:00 - Selected -->
          <button class="inline-flex items-center gap-1.5 px-3 py-1.5 text-sm rounded-lg border border-blue-500 bg-blue-50 text-blue-700 ring-1 ring-blue-500">
            <span class="font-medium">20:00</span>
            <span class="text-xs px-1.5 py-0.5 rounded border bg-red-50 text-red-700 border-red-200">晚间高峰</span>
          </button>
          <!-- 22:00 -->
          <button class="inline-flex items-center gap-1.5 px-3 py-1.5 text-sm rounded-lg border border-gray-200 text-gray-600">
            <span class="font-medium">22:00</span>
            <span class="text-xs px-1.5 py-0.5 rounded border bg-amber-50 text-amber-700 border-amber-200">睡前浏览</span>
          </button>
        </div>

        <!-- Custom slot input -->
        <div class="flex items-center gap-2">
          <div class="px-3 py-1.5 text-sm border border-gray-200 rounded-lg text-gray-400 bg-white w-32">自定义时段</div>
          <button class="px-3 py-1.5 text-sm font-medium text-blue-600 hover:text-blue-700 hover:bg-blue-50 rounded-lg opacity-40">+ 添加</button>
        </div>

        <!-- Selected slots summary -->
        <div class="mt-3 flex items-center gap-2 text-xs text-gray-500">
          <span>已选时段：</span>
          <span class="inline-flex items-center gap-1 bg-blue-50 text-blue-700 px-2 py-0.5 rounded-md">10:00 <span class="cursor-pointer hover:text-blue-900">×</span></span>
          <span class="inline-flex items-center gap-1 bg-blue-50 text-blue-700 px-2 py-0.5 rounded-md">20:00 <span class="cursor-pointer hover:text-blue-900">×</span></span>
        </div>
      </section>

      <!-- Summary -->
      <div class="p-4 bg-slate-50 rounded-lg border border-gray-100">
        <p class="text-sm text-gray-700">
          将为 <span class="font-semibold text-gray-900">2</span> 个账号生成
          <span class="font-semibold text-gray-900">2026-03-25 ~ 2026-03-31</span>
          期间的排期，每天 <span class="font-semibold text-gray-900">2</span> 篇，时段：10:00、20:00
        </p>
      </div>

    </div>

    <!-- Footer -->
    <div class="flex items-center justify-end gap-3 px-6 py-4 border-t border-gray-200">
      <button class="px-4 py-2 text-sm font-medium text-gray-700 bg-white border border-gray-200 rounded-lg hover:bg-gray-50">
        取消
      </button>
      <button class="px-5 py-2 text-sm font-medium text-white bg-blue-600 rounded-lg hover:bg-blue-700">
        生成排期预览
      </button>
    </div>

  </div>

</body>
</html>
