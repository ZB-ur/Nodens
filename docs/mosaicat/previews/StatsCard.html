<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>StatsCard Preview</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { margin: 0; padding: 16px; background: #f8fafc; font-family: system-ui, sans-serif; }
  </style>
</head>
<body>
  <div class="max-w-4xl mx-auto space-y-8">
    <!-- Row of 4 cards -->
    <div class="grid grid-cols-4 gap-4">

      <!-- Today Published (default) -->
      <div class="bg-white border border-gray-200 rounded-xl shadow-sm p-6 flex items-start gap-4">
        <div class="flex-shrink-0 w-11 h-11 rounded-lg flex items-center justify-center bg-blue-50 text-blue-600">
          <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M12 19V5m0 0l-7 7m7-7l7 7"/>
          </svg>
        </div>
        <div class="flex-1 min-w-0">
          <p class="text-sm font-medium text-gray-600 truncate">今日发布数</p>
          <div class="mt-1 flex items-baseline gap-2">
            <span class="text-2xl font-bold text-gray-900">12</span>
            <span class="inline-flex items-center text-sm font-medium text-emerald-500">
              <svg class="w-4 h-4 mr-0.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round" d="M5 15l7-7 7 7"/>
              </svg>
              +20%
            </span>
          </div>
        </div>
      </div>

      <!-- Success Rate (success) -->
      <div class="bg-white border border-gray-200 rounded-xl shadow-sm p-6 flex items-start gap-4">
        <div class="flex-shrink-0 w-11 h-11 rounded-lg flex items-center justify-center bg-emerald-50 text-emerald-500">
          <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"/>
          </svg>
        </div>
        <div class="flex-1 min-w-0">
          <p class="text-sm font-medium text-gray-600 truncate">成功率</p>
          <div class="mt-1 flex items-baseline gap-2">
            <span class="text-2xl font-bold text-gray-900">91.7%</span>
            <span class="inline-flex items-center text-sm font-medium text-emerald-500">
              <svg class="w-4 h-4 mr-0.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round" d="M5 15l7-7 7 7"/>
              </svg>
              +5.2%
            </span>
          </div>
        </div>
      </div>

      <!-- Failed Count (danger) -->
      <div class="bg-white border border-gray-200 rounded-xl shadow-sm p-6 flex items-start gap-4">
        <div class="flex-shrink-0 w-11 h-11 rounded-lg flex items-center justify-center bg-red-50 text-red-500">
          <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/>
          </svg>
        </div>
        <div class="flex-1 min-w-0">
          <p class="text-sm font-medium text-gray-600 truncate">失败任务</p>
          <div class="mt-1 flex items-baseline gap-2">
            <span class="text-2xl font-bold text-gray-900">1</span>
            <span class="inline-flex items-center text-sm font-medium text-red-500">
              <svg class="w-4 h-4 mr-0.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round" d="M19 9l-7 7-7-7"/>
              </svg>
              +1
            </span>
          </div>
        </div>
      </div>

      <!-- Pending (warning) -->
      <div class="bg-white border border-gray-200 rounded-xl shadow-sm p-6 flex items-start gap-4">
        <div class="flex-shrink-0 w-11 h-11 rounded-lg flex items-center justify-center bg-amber-50 text-amber-500">
          <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/>
          </svg>
        </div>
        <div class="flex-1 min-w-0">
          <p class="text-sm font-medium text-gray-600 truncate">待发布</p>
          <div class="mt-1 flex items-baseline gap-2">
            <span class="text-2xl font-bold text-gray-900">5</span>
          </div>
        </div>
      </div>

    </div>

    <!-- Larger single card without trend (no icon) -->
    <div class="max-w-xs">
      <div class="bg-white border border-gray-200 rounded-xl shadow-sm p-6">
        <div class="flex-1 min-w-0">
          <p class="text-sm font-medium text-gray-600 truncate">本周总发布</p>
          <div class="mt-1 flex items-baseline gap-2">
            <span class="text-2xl font-bold text-gray-900">48</span>
          </div>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
