<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Drawer Preview</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { margin: 0; padding: 0; background: #f8fafc; font-family: system-ui, sans-serif; }
    @keyframes slideInRight {
      from { transform: translateX(100%); }
      to { transform: translateX(0); }
    }
    .animate-slide-in-right {
      animation: slideInRight 0.25s ease-out forwards;
    }
  </style>
</head>
<body>
  <!-- Background page content (dimmed) -->
  <div class="p-6 space-y-4">
    <h1 class="text-2xl font-bold text-gray-900">排期管理</h1>
    <div class="grid grid-cols-3 gap-4">
      <div class="bg-white rounded-xl border border-gray-200 shadow-sm p-4 h-24"></div>
      <div class="bg-white rounded-xl border border-gray-200 shadow-sm p-4 h-24"></div>
      <div class="bg-white rounded-xl border border-gray-200 shadow-sm p-4 h-24"></div>
    </div>
    <div class="bg-white rounded-xl border border-gray-200 shadow-sm p-4 h-64"></div>
  </div>

  <!-- Drawer overlay -->
  <div class="fixed inset-0 z-50 flex justify-end">
    <!-- Backdrop -->
    <div class="absolute inset-0 bg-black/40"></div>

    <!-- Drawer panel (md width) -->
    <div class="relative w-full max-w-md bg-white shadow-xl flex flex-col animate-slide-in-right" style="height:100vh;">
      <!-- Header -->
      <div class="flex items-center justify-between px-6 py-4 border-b border-gray-200">
        <h2 class="text-lg font-semibold text-gray-900">排期规则配置</h2>
        <button class="ml-auto p-1.5 rounded-lg text-gray-400 hover:text-gray-600 hover:bg-gray-100 transition-colors">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
            <path fill-rule="evenodd" d="M4.293 4.293a1 1 0 011.414 0L10 8.586l4.293-4.293a1 1 0 111.414 1.414L11.414 10l4.293 4.293a1 1 0 01-1.414 1.414L10 11.414l-4.293 4.293a1 1 0 01-1.414-1.414L8.586 10 4.293 5.707a1 1 0 010-1.414z" clip-rule="evenodd" />
          </svg>
        </button>
      </div>

      <!-- Body -->
      <div class="flex-1 overflow-y-auto px-6 py-6 space-y-6">
        <!-- Account selector -->
        <div class="space-y-2">
          <label class="block text-sm font-medium text-gray-900">目标账号</label>
          <div class="flex flex-wrap gap-2">
            <span class="inline-flex items-center gap-1.5 px-3 py-1.5 rounded-lg bg-blue-50 text-blue-700 text-sm font-medium border border-blue-200">
              <span class="w-5 h-5 rounded-full bg-blue-200 flex-shrink-0"></span>
              美妆日记
            </span>
            <span class="inline-flex items-center gap-1.5 px-3 py-1.5 rounded-lg bg-gray-50 text-gray-600 text-sm border border-gray-200">
              <span class="w-5 h-5 rounded-full bg-gray-200 flex-shrink-0"></span>
              好物分享
            </span>
            <span class="inline-flex items-center gap-1.5 px-3 py-1.5 rounded-lg bg-gray-50 text-gray-600 text-sm border border-gray-200">
              <span class="w-5 h-5 rounded-full bg-gray-200 flex-shrink-0"></span>
              穿搭笔记
            </span>
          </div>
        </div>

        <!-- Date range -->
        <div class="space-y-2">
          <label class="block text-sm font-medium text-gray-900">排期日期范围</label>
          <div class="grid grid-cols-2 gap-3">
            <div>
              <label class="block text-xs text-gray-400 mb-1">开始日期</label>
              <input type="text" value="2026-03-24" readonly class="w-full px-3 py-2 text-sm border border-gray-200 rounded-lg bg-white text-gray-900 focus:ring-2 focus:ring-blue-500 focus:border-blue-500" />
            </div>
            <div>
              <label class="block text-xs text-gray-400 mb-1">结束日期</label>
              <input type="text" value="2026-03-30" readonly class="w-full px-3 py-2 text-sm border border-gray-200 rounded-lg bg-white text-gray-900 focus:ring-2 focus:ring-blue-500 focus:border-blue-500" />
            </div>
          </div>
        </div>

        <!-- Posts per day -->
        <div class="space-y-2">
          <label class="block text-sm font-medium text-gray-900">每日发布篇数</label>
          <div class="flex items-center gap-3">
            <button class="w-8 h-8 flex items-center justify-center rounded-lg border border-gray-200 text-gray-400 hover:bg-gray-50">−</button>
            <span class="text-lg font-semibold text-gray-900 w-8 text-center">2</span>
            <button class="w-8 h-8 flex items-center justify-center rounded-lg border border-gray-200 text-gray-400 hover:bg-gray-50">+</button>
            <span class="text-sm text-gray-400">篇/天</span>
          </div>
        </div>

        <!-- Time slots -->
        <div class="space-y-2">
          <label class="block text-sm font-medium text-gray-900">发布时段</label>
          <div class="space-y-2">
            <div class="flex items-center justify-between p-3 bg-blue-50 rounded-lg border border-blue-200">
              <div class="flex items-center gap-2">
                <span class="text-sm font-medium text-blue-700">10:00</span>
                <span class="text-xs text-blue-500 bg-blue-100 px-1.5 py-0.5 rounded">早间流量高峰</span>
              </div>
              <button class="text-blue-400 hover:text-blue-600">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" viewBox="0 0 20 20" fill="currentColor">
                  <path fill-rule="evenodd" d="M4.293 4.293a1 1 0 011.414 0L10 8.586l4.293-4.293a1 1 0 111.414 1.414L11.414 10l4.293 4.293a1 1 0 01-1.414 1.414L10 11.414l-4.293 4.293a1 1 0 01-1.414-1.414L8.586 10 4.293 5.707a1 1 0 010-1.414z" clip-rule="evenodd" />
                </svg>
              </button>
            </div>
            <div class="flex items-center justify-between p-3 bg-blue-50 rounded-lg border border-blue-200">
              <div class="flex items-center gap-2">
                <span class="text-sm font-medium text-blue-700">20:00</span>
                <span class="text-xs text-blue-500 bg-blue-100 px-1.5 py-0.5 rounded">晚间流量高峰</span>
              </div>
              <button class="text-blue-400 hover:text-blue-600">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" viewBox="0 0 20 20" fill="currentColor">
                  <path fill-rule="evenodd" d="M4.293 4.293a1 1 0 011.414 0L10 8.586l4.293-4.293a1 1 0 111.414 1.414L11.414 10l4.293 4.293a1 1 0 01-1.414 1.414L10 11.414l-4.293 4.293a1 1 0 01-1.414-1.414L8.586 10 4.293 5.707a1 1 0 010-1.414z" clip-rule="evenodd" />
                </svg>
              </button>
            </div>
          </div>
          <button class="text-sm text-blue-600 hover:text-blue-700 font-medium flex items-center gap-1 mt-1">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" viewBox="0 0 20 20" fill="currentColor">
              <path fill-rule="evenodd" d="M10 3a1 1 0 011 1v5h5a1 1 0 110 2h-5v5a1 1 0 11-2 0v-5H4a1 1 0 110-2h5V4a1 1 0 011-1z" clip-rule="evenodd" />
            </svg>
            添加时段
          </button>
        </div>

        <!-- Conflict warning -->
        <div class="p-3 bg-amber-50 border border-amber-200 rounded-lg flex items-start gap-2">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-amber-500 flex-shrink-0 mt-0.5" viewBox="0 0 20 20" fill="currentColor">
            <path fill-rule="evenodd" d="M8.257 3.099c.765-1.36 2.722-1.36 3.486 0l5.58 9.92c.75 1.334-.213 2.98-1.742 2.98H4.42c-1.53 0-2.493-1.646-1.743-2.98l5.58-9.92zM11 13a1 1 0 11-2 0 1 1 0 012 0zm-1-8a1 1 0 00-1 1v3a1 1 0 002 0V6a1 1 0 00-1-1z" clip-rule="evenodd" />
          </svg>
          <div>
            <p class="text-sm font-medium text-amber-800">检测到 1 个时间冲突</p>
            <p class="text-xs text-amber-600 mt-0.5">美妆日记 3月25日 10:00 与已有排期间隔不足 120 分钟</p>
          </div>
        </div>
      </div>

      <!-- Footer actions -->
      <div class="px-6 py-4 border-t border-gray-200 flex items-center gap-3">
        <button class="flex-1 px-4 py-2.5 text-sm font-medium text-gray-600 bg-white border border-gray-200 rounded-lg hover:bg-gray-50 transition-colors">
          取消
        </button>
        <button class="flex-1 px-4 py-2.5 text-sm font-medium text-white bg-blue-600 rounded-lg hover:bg-blue-700 transition-colors">
          生成排期
        </button>
      </div>
    </div>
  </div>
</body>
</html>
