<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FilterBar Preview</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { margin: 0; padding: 16px; background: #f8fafc; font-family: system-ui, sans-serif; }
  </style>
</head>
<body>

  <!-- State 1: Default / partial selections -->
  <p class="mb-2 text-xs font-semibold uppercase tracking-wide text-gray-400">Default State</p>
  <div class="flex flex-wrap items-center gap-3 rounded-xl border border-gray-200 bg-white p-4 shadow-sm">
    <!-- Select: 账号 -->
    <div class="relative">
      <button class="flex items-center gap-2 rounded-lg border border-gray-200 bg-slate-50 px-3 py-2 text-sm text-gray-900 transition hover:border-blue-600">
        <span class="text-gray-600">账号:</span>
        <span class="font-medium">全部</span>
        <svg class="h-4 w-4 text-gray-400" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/></svg>
      </button>
    </div>

    <!-- Select: 状态 -->
    <div class="relative">
      <button class="flex items-center gap-2 rounded-lg border border-blue-600 bg-slate-50 px-3 py-2 text-sm text-gray-900 ring-2 ring-blue-600/20">
        <span class="text-gray-600">状态:</span>
        <span class="font-medium text-blue-600">已发布</span>
        <svg class="h-4 w-4 text-gray-400" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/></svg>
      </button>
    </div>

    <!-- Tag: 分类 -->
    <div class="flex items-center gap-2">
      <span class="text-sm text-gray-600">分类:</span>
      <div class="flex flex-wrap gap-1.5">
        <span class="rounded-full bg-blue-600 px-3 py-1 text-xs font-medium text-white shadow-sm">美妆</span>
        <span class="rounded-full bg-slate-50 px-3 py-1 text-xs font-medium text-gray-600">穿搭</span>
        <span class="rounded-full bg-blue-600 px-3 py-1 text-xs font-medium text-white shadow-sm">美食</span>
        <span class="rounded-full bg-slate-50 px-3 py-1 text-xs font-medium text-gray-600">旅行</span>
        <span class="rounded-full bg-slate-50 px-3 py-1 text-xs font-medium text-gray-600">家居</span>
      </div>
    </div>

    <!-- Search -->
    <div class="relative ml-auto">
      <svg class="absolute left-3 top-1/2 h-4 w-4 -translate-y-1/2 text-gray-400" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
      <input type="text" placeholder="搜索关键词..." class="w-56 rounded-lg border border-gray-200 bg-slate-50 py-2 pl-9 pr-3 text-sm text-gray-900 placeholder-gray-400" />
    </div>
  </div>

  <!-- State 2: Dropdown open -->
  <p class="mb-2 mt-8 text-xs font-semibold uppercase tracking-wide text-gray-400">Dropdown Open</p>
  <div class="flex flex-wrap items-center gap-3 rounded-xl border border-gray-200 bg-white p-4 shadow-sm">
    <!-- Select: 账号 (open) -->
    <div class="relative">
      <button class="flex items-center gap-2 rounded-lg border border-blue-600 bg-slate-50 px-3 py-2 text-sm text-gray-900 ring-2 ring-blue-600/20">
        <span class="text-gray-600">账号:</span>
        <span class="font-medium">全部</span>
        <svg class="h-4 w-4 rotate-180 text-gray-400" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/></svg>
      </button>
      <div class="absolute left-0 z-10 mt-1 min-w-[160px] rounded-lg border border-gray-200 bg-white py-1 shadow-md">
        <div class="block w-full px-3 py-1.5 text-left text-sm font-medium text-blue-600">全部</div>
        <div class="block w-full px-3 py-1.5 text-left text-sm text-gray-600 hover:bg-slate-50">小红书达人A</div>
        <div class="block w-full px-3 py-1.5 text-left text-sm text-gray-600 hover:bg-slate-50">美妆博主B</div>
        <div class="block w-full px-3 py-1.5 text-left text-sm text-gray-600 hover:bg-slate-50">生活号C</div>
      </div>
    </div>

    <!-- Select: 状态 -->
    <div class="relative">
      <button class="flex items-center gap-2 rounded-lg border border-gray-200 bg-slate-50 px-3 py-2 text-sm text-gray-900">
        <span class="text-gray-600">状态:</span>
        <span class="font-medium">全部</span>
        <svg class="h-4 w-4 text-gray-400" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/></svg>
      </button>
    </div>

    <!-- Tag: 分类 -->
    <div class="flex items-center gap-2">
      <span class="text-sm text-gray-600">分类:</span>
      <div class="flex flex-wrap gap-1.5">
        <span class="rounded-full bg-slate-50 px-3 py-1 text-xs font-medium text-gray-600">美妆</span>
        <span class="rounded-full bg-slate-50 px-3 py-1 text-xs font-medium text-gray-600">穿搭</span>
        <span class="rounded-full bg-slate-50 px-3 py-1 text-xs font-medium text-gray-600">美食</span>
        <span class="rounded-full bg-slate-50 px-3 py-1 text-xs font-medium text-gray-600">旅行</span>
        <span class="rounded-full bg-slate-50 px-3 py-1 text-xs font-medium text-gray-600">家居</span>
      </div>
    </div>

    <!-- Search with value -->
    <div class="relative ml-auto">
      <svg class="absolute left-3 top-1/2 h-4 w-4 -translate-y-1/2 text-gray-400" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
      <input type="text" value="春季护肤" class="w-56 rounded-lg border border-blue-600 bg-white py-2 pl-9 pr-8 text-sm text-gray-900 ring-2 ring-blue-600/20" />
      <button class="absolute right-2.5 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-600">
        <svg class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
      </button>
    </div>
  </div>

</body>
</html>
