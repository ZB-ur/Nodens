<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AccountGrid Preview</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { margin: 0; padding: 16px; background: #f8fafc; font-family: system-ui, sans-serif; }
  </style>
</head>
<body>

  <!-- ===== Section 1: Empty State ===== -->
  <div class="mx-auto max-w-4xl mb-12">
    <p class="mb-3 text-xs font-mono text-gray-400 uppercase tracking-wide">Empty State</p>
    <div class="flex flex-col items-center justify-center rounded-xl border-2 border-dashed border-gray-200 bg-white px-6 py-16 text-center">
      <div class="mx-auto mb-4 flex h-16 w-16 items-center justify-center rounded-full bg-blue-50">
        <svg class="h-8 w-8 text-blue-600" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
          <path stroke-linecap="round" stroke-linejoin="round" d="M18 18.72a9.094 9.094 0 003.741-.479 3 3 0 00-4.682-2.72m.94 3.198l.001.031c0 .225-.012.447-.037.666A11.944 11.944 0 0112 21c-2.17 0-4.207-.576-5.963-1.584A6.062 6.062 0 016 18.719m12 0a5.971 5.971 0 00-.941-3.197m0 0A5.995 5.995 0 0012 12.75a5.995 5.995 0 00-5.058 2.772m0 0a3 3 0 00-4.681 2.72 8.986 8.986 0 003.74.477m.94-3.197a5.971 5.971 0 00-.94 3.197M15 6.75a3 3 0 11-6 0 3 3 0 016 0zm6 3a2.25 2.25 0 11-4.5 0 2.25 2.25 0 014.5 0zm-13.5 0a2.25 2.25 0 11-4.5 0 2.25 2.25 0 014.5 0z" />
        </svg>
      </div>
      <h3 class="mb-2 text-lg font-semibold text-gray-900">还没有账号</h3>
      <p class="mb-6 max-w-sm text-sm text-gray-600">添加你的小红书账号，开始自动化管理你的自媒体矩阵</p>
      <button class="inline-flex items-center gap-2 rounded-lg bg-blue-600 px-5 py-2.5 text-sm font-medium text-white shadow-sm hover:bg-blue-700">
        <svg class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M12 4.5v15m7.5-7.5h-15" />
        </svg>
        添加账号
      </button>
    </div>
  </div>

  <!-- ===== Section 2: Grid with Accounts ===== -->
  <div class="mx-auto max-w-4xl space-y-4">
    <p class="mb-1 text-xs font-mono text-gray-400 uppercase tracking-wide">With Accounts (3/5)</p>

    <div class="flex items-center justify-between">
      <h2 class="text-lg font-semibold text-gray-900">
        矩阵账号
        <span class="ml-2 text-sm font-normal text-gray-400">3/5</span>
      </h2>
      <button class="inline-flex items-center gap-1.5 rounded-lg bg-blue-600 px-4 py-2 text-sm font-medium text-white shadow-sm hover:bg-blue-700">
        <svg class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M12 4.5v15m7.5-7.5h-15" />
        </svg>
        添加账号
      </button>
    </div>

    <div class="grid grid-cols-1 gap-4 sm:grid-cols-2 lg:grid-cols-3">

      <!-- Card 1: Valid cookie, topic configured -->
      <div class="group relative rounded-xl border border-gray-200 bg-white p-5 shadow-sm">
        <button class="absolute right-3 top-3 rounded-lg p-1.5 text-gray-300 hover:bg-red-50 hover:text-red-500" title="删除账号">
          <svg class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M14.74 9l-.346 9m-4.788 0L9.26 9m9.968-3.21c.342.052.682.107 1.022.166m-1.022-.165L18.16 19.673a2.25 2.25 0 01-2.244 2.077H8.084a2.25 2.25 0 01-2.244-2.077L4.772 5.79m14.456 0a48.108 48.108 0 00-3.478-.397m-12 .562c.34-.059.68-.114 1.022-.165m0 0a48.11 48.11 0 013.478-.397m7.5 0v-.916c0-1.18-.91-2.164-2.09-2.201a51.964 51.964 0 00-3.32 0c-1.18.037-2.09 1.022-2.09 2.201v.916m7.5 0a48.667 48.667 0 00-7.5 0" />
          </svg>
        </button>
        <div class="flex items-start gap-3">
          <div class="h-12 w-12 flex-shrink-0 rounded-full border border-gray-100 bg-gradient-to-br from-pink-300 to-rose-400"></div>
          <div class="min-w-0 flex-1">
            <h3 class="truncate text-base font-semibold text-gray-900">美妆小达人</h3>
            <div class="mt-0.5 flex items-center gap-1.5">
              <span class="inline-block h-2 w-2 rounded-full bg-emerald-500"></span>
              <span class="text-xs font-medium text-emerald-600">Cookie 有效</span>
            </div>
          </div>
        </div>
        <div class="mt-4 flex items-center gap-3 text-xs text-gray-400">
          <span class="inline-flex items-center gap-1">
            <svg class="h-3.5 w-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round" d="M12 6v6h4.5m4.5 0a9 9 0 11-18 0 9 9 0 0118 0z" />
            </svg>
            小红书
          </span>
          <span class="inline-flex items-center gap-1 text-emerald-500">
            <svg class="h-3.5 w-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round" d="M9 12.75L11.25 15 15 9.75M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
            </svg>
            已配置主题
          </span>
        </div>
        <button class="mt-4 w-full rounded-lg border border-gray-200 bg-gray-50 px-3 py-2 text-sm font-medium text-gray-700 hover:bg-gray-100">配置管理</button>
      </div>

      <!-- Card 2: Expiring cookie, topic not configured -->
      <div class="group relative rounded-xl border border-gray-200 bg-white p-5 shadow-sm">
        <button class="absolute right-3 top-3 rounded-lg p-1.5 text-gray-300 hover:bg-red-50 hover:text-red-500" title="删除账号">
          <svg class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M14.74 9l-.346 9m-4.788 0L9.26 9m9.968-3.21c.342.052.682.107 1.022.166m-1.022-.165L18.16 19.673a2.25 2.25 0 01-2.244 2.077H8.084a2.25 2.25 0 01-2.244-2.077L4.772 5.79m14.456 0a48.108 48.108 0 00-3.478-.397m-12 .562c.34-.059.68-.114 1.022-.165m0 0a48.11 48.11 0 013.478-.397m7.5 0v-.916c0-1.18-.91-2.164-2.09-2.201a51.964 51.964 0 00-3.32 0c-1.18.037-2.09 1.022-2.09 2.201v.916m7.5 0a48.667 48.667 0 00-7.5 0" />
          </svg>
        </button>
        <div class="flex items-start gap-3">
          <div class="h-12 w-12 flex-shrink-0 rounded-full border border-gray-100 bg-gradient-to-br from-violet-300 to-purple-400"></div>
          <div class="min-w-0 flex-1">
            <h3 class="truncate text-base font-semibold text-gray-900">生活好物分享</h3>
            <div class="mt-0.5 flex items-center gap-1.5">
              <span class="inline-block h-2 w-2 rounded-full bg-amber-500"></span>
              <span class="text-xs font-medium text-amber-600">即将过期</span>
            </div>
          </div>
        </div>
        <div class="mt-4 flex items-center gap-3 text-xs text-gray-400">
          <span class="inline-flex items-center gap-1">
            <svg class="h-3.5 w-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round" d="M12 6v6h4.5m4.5 0a9 9 0 11-18 0 9 9 0 0118 0z" />
            </svg>
            小红书
          </span>
          <span class="inline-flex items-center gap-1 text-amber-500">
            <svg class="h-3.5 w-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v3.75m9-.75a9 9 0 11-18 0 9 9 0 0118 0zm-9 3.75h.008v.008H12v-.008z" />
            </svg>
            未配置主题
          </span>
        </div>
        <button class="mt-4 w-full rounded-lg border border-gray-200 bg-gray-50 px-3 py-2 text-sm font-medium text-gray-700 hover:bg-gray-100">配置管理</button>
      </div>

      <!-- Card 3: Expired cookie, topic configured -->
      <div class="group relative rounded-xl border border-gray-200 bg-white p-5 shadow-sm">
        <button class="absolute right-3 top-3 rounded-lg p-1.5 text-gray-300 hover:bg-red-50 hover:text-red-500" title="删除账号">
          <svg class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M14.74 9l-.346 9m-4.788 0L9.26 9m9.968-3.21c.342.052.682.107 1.022.166m-1.022-.165L18.16 19.673a2.25 2.25 0 01-2.244 2.077H8.084a2.25 2.25 0 01-2.244-2.077L4.772 5.79m14.456 0a48.108 48.108 0 00-3.478-.397m-12 .562c.34-.059.68-.114 1.022-.165m0 0a48.11 48.11 0 013.478-.397m7.5 0v-.916c0-1.18-.91-2.164-2.09-2.201a51.964 51.964 0 00-3.32 0c-1.18.037-2.09 1.022-2.09 2.201v.916m7.5 0a48.667 48.667 0 00-7.5 0" />
          </svg>
        </button>
        <div class="flex items-start gap-3">
          <div class="h-12 w-12 flex-shrink-0 rounded-full border border-gray-100 bg-gradient-to-br from-sky-300 to-blue-400"></div>
          <div class="min-w-0 flex-1">
            <h3 class="truncate text-base font-semibold text-gray-900">旅行日记本</h3>
            <div class="mt-0.5 flex items-center gap-1.5">
              <span class="inline-block h-2 w-2 rounded-full bg-red-500"></span>
              <span class="text-xs font-medium text-red-600">Cookie 失效</span>
            </div>
          </div>
        </div>
        <div class="mt-4 flex items-center gap-3 text-xs text-gray-400">
          <span class="inline-flex items-center gap-1">
            <svg class="h-3.5 w-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round" d="M12 6v6h4.5m4.5 0a9 9 0 11-18 0 9 9 0 0118 0z" />
            </svg>
            小红书
          </span>
          <span class="inline-flex items-center gap-1 text-emerald-500">
            <svg class="h-3.5 w-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round" d="M9 12.75L11.25 15 15 9.75M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
            </svg>
            已配置主题
          </span>
        </div>
        <button class="mt-4 w-full rounded-lg border border-gray-200 bg-gray-50 px-3 py-2 text-sm font-medium text-gray-700 hover:bg-gray-100">配置管理</button>
      </div>

    </div>
  </div>

</body>
</html>
