<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TimeSlotPicker Preview</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { margin: 0; padding: 16px; background: #f8fafc; font-family: system-ui, sans-serif; }
  </style>
</head>
<body>
  <div class="max-w-lg mx-auto bg-white rounded-xl border border-gray-200 shadow-sm p-6 space-y-4">

    <!-- Header -->
    <div class="flex items-center justify-between">
      <div>
        <h4 class="text-sm font-semibold text-gray-900">选择发布时段</h4>
        <p class="text-xs text-gray-500 mt-0.5">
          已选 <span class="font-medium text-blue-600">3</span> 个时段 · 高亮为推荐流量高峰
        </p>
      </div>
      <button class="text-xs text-gray-400 hover:text-gray-600 transition-colors">清除全部</button>
    </div>

    <!-- Legend -->
    <div class="flex items-center gap-4 text-xs">
      <span class="flex items-center gap-1">
        <span class="w-3 h-3 rounded-sm bg-amber-100 ring-1 ring-amber-400"></span>
        <span class="text-gray-500">高峰时段</span>
      </span>
      <span class="flex items-center gap-1">
        <span class="w-3 h-3 rounded-sm bg-blue-100 ring-1 ring-blue-300"></span>
        <span class="text-gray-500">推荐时段</span>
      </span>
    </div>

    <!-- Time Slot Grid -->
    <div class="grid grid-cols-6 gap-2">

      <!-- 06:00 - normal unselected -->
      <button class="relative flex flex-col items-center justify-center py-2.5 px-1 rounded-lg border bg-white border-gray-200 text-gray-700 hover:bg-gray-50 hover:border-gray-300 text-sm transition-all duration-150">
        <span class="font-medium text-gray-900">06:00</span>
      </button>

      <!-- 07:00 - normal unselected -->
      <button class="relative flex flex-col items-center justify-center py-2.5 px-1 rounded-lg border bg-white border-gray-200 text-gray-700 hover:bg-gray-50 hover:border-gray-300 text-sm transition-all duration-150">
        <span class="font-medium text-gray-900">07:00</span>
      </button>

      <!-- 08:00 - medium recommended, unselected -->
      <button class="relative flex flex-col items-center justify-center py-2.5 px-1 rounded-lg border bg-white border-gray-200 ring-2 ring-blue-300 hover:bg-gray-50 text-sm transition-all duration-150">
        <span class="font-medium text-gray-900">08:00</span>
        <span class="text-[10px] mt-0.5 text-blue-600">通勤时段</span>
      </button>

      <!-- 09:00 - normal unselected -->
      <button class="relative flex flex-col items-center justify-center py-2.5 px-1 rounded-lg border bg-white border-gray-200 text-gray-700 hover:bg-gray-50 hover:border-gray-300 text-sm transition-all duration-150">
        <span class="font-medium text-gray-900">09:00</span>
      </button>

      <!-- 10:00 - HIGH recommended, SELECTED -->
      <button class="relative flex flex-col items-center justify-center py-2.5 px-1 rounded-lg border bg-blue-600 text-white border-blue-600 shadow-sm text-sm transition-all duration-150">
        <span class="font-medium text-white">10:00</span>
        <span class="text-[10px] mt-0.5 text-blue-200">早间高峰</span>
      </button>

      <!-- 11:00 - normal unselected -->
      <button class="relative flex flex-col items-center justify-center py-2.5 px-1 rounded-lg border bg-white border-gray-200 text-gray-700 hover:bg-gray-50 hover:border-gray-300 text-sm transition-all duration-150">
        <span class="font-medium text-gray-900">11:00</span>
      </button>

      <!-- 12:00 - HIGH recommended, unselected -->
      <button class="relative flex flex-col items-center justify-center py-2.5 px-1 rounded-lg border bg-white border-gray-200 ring-2 ring-amber-400 hover:bg-gray-50 text-sm transition-all duration-150">
        <span class="font-medium text-gray-900">12:00</span>
        <span class="text-[10px] mt-0.5 text-amber-600">午间高峰</span>
        <span class="absolute -top-1 -right-1 w-2 h-2 rounded-full bg-amber-400"></span>
      </button>

      <!-- 13:00 - normal unselected -->
      <button class="relative flex flex-col items-center justify-center py-2.5 px-1 rounded-lg border bg-white border-gray-200 text-gray-700 hover:bg-gray-50 hover:border-gray-300 text-sm transition-all duration-150">
        <span class="font-medium text-gray-900">13:00</span>
      </button>

      <!-- 14:00 - normal unselected -->
      <button class="relative flex flex-col items-center justify-center py-2.5 px-1 rounded-lg border bg-white border-gray-200 text-gray-700 hover:bg-gray-50 hover:border-gray-300 text-sm transition-all duration-150">
        <span class="font-medium text-gray-900">14:00</span>
      </button>

      <!-- 15:00 - normal unselected -->
      <button class="relative flex flex-col items-center justify-center py-2.5 px-1 rounded-lg border bg-white border-gray-200 text-gray-700 hover:bg-gray-50 hover:border-gray-300 text-sm transition-all duration-150">
        <span class="font-medium text-gray-900">15:00</span>
      </button>

      <!-- 16:00 - normal unselected -->
      <button class="relative flex flex-col items-center justify-center py-2.5 px-1 rounded-lg border bg-white border-gray-200 text-gray-700 hover:bg-gray-50 hover:border-gray-300 text-sm transition-all duration-150">
        <span class="font-medium text-gray-900">16:00</span>
      </button>

      <!-- 17:00 - medium recommended, unselected -->
      <button class="relative flex flex-col items-center justify-center py-2.5 px-1 rounded-lg border bg-white border-gray-200 ring-2 ring-blue-300 hover:bg-gray-50 text-sm transition-all duration-150">
        <span class="font-medium text-gray-900">17:00</span>
        <span class="text-[10px] mt-0.5 text-blue-600">下班时段</span>
      </button>

      <!-- 18:00 - normal unselected -->
      <button class="relative flex flex-col items-center justify-center py-2.5 px-1 rounded-lg border bg-white border-gray-200 text-gray-700 hover:bg-gray-50 hover:border-gray-300 text-sm transition-all duration-150">
        <span class="font-medium text-gray-900">18:00</span>
      </button>

      <!-- 19:00 - normal unselected -->
      <button class="relative flex flex-col items-center justify-center py-2.5 px-1 rounded-lg border bg-white border-gray-200 text-gray-700 hover:bg-gray-50 hover:border-gray-300 text-sm transition-all duration-150">
        <span class="font-medium text-gray-900">19:00</span>
      </button>

      <!-- 20:00 - HIGH recommended, SELECTED -->
      <button class="relative flex flex-col items-center justify-center py-2.5 px-1 rounded-lg border bg-blue-600 text-white border-blue-600 shadow-sm text-sm transition-all duration-150">
        <span class="font-medium text-white">20:00</span>
        <span class="text-[10px] mt-0.5 text-blue-200">晚间高峰</span>
      </button>

      <!-- 21:00 - HIGH recommended, unselected -->
      <button class="relative flex flex-col items-center justify-center py-2.5 px-1 rounded-lg border bg-white border-gray-200 ring-2 ring-amber-400 hover:bg-gray-50 text-sm transition-all duration-150">
        <span class="font-medium text-gray-900">21:00</span>
        <span class="text-[10px] mt-0.5 text-amber-600">黄金时段</span>
        <span class="absolute -top-1 -right-1 w-2 h-2 rounded-full bg-amber-400"></span>
      </button>

      <!-- 22:00 - medium recommended, SELECTED -->
      <button class="relative flex flex-col items-center justify-center py-2.5 px-1 rounded-lg border bg-blue-600 text-white border-blue-600 shadow-sm text-sm transition-all duration-150">
        <span class="font-medium text-white">22:00</span>
        <span class="text-[10px] mt-0.5 text-blue-200">睡前时段</span>
      </button>

      <!-- 23:00 - normal unselected -->
      <button class="relative flex flex-col items-center justify-center py-2.5 px-1 rounded-lg border bg-white border-gray-200 text-gray-700 hover:bg-gray-50 hover:border-gray-300 text-sm transition-all duration-150">
        <span class="font-medium text-gray-900">23:00</span>
      </button>
    </div>

    <!-- Selected Summary Tags -->
    <div class="flex flex-wrap gap-1.5 pt-1">
      <span class="inline-flex items-center gap-1 px-2 py-0.5 rounded-md text-xs font-medium bg-amber-100 text-amber-700">
        10:00
        <span class="opacity-70">· 早间高峰</span>
        <span class="ml-0.5 cursor-pointer hover:opacity-70">×</span>
      </span>
      <span class="inline-flex items-center gap-1 px-2 py-0.5 rounded-md text-xs font-medium bg-amber-100 text-amber-700">
        20:00
        <span class="opacity-70">· 晚间高峰</span>
        <span class="ml-0.5 cursor-pointer hover:opacity-70">×</span>
      </span>
      <span class="inline-flex items-center gap-1 px-2 py-0.5 rounded-md text-xs font-medium bg-blue-100 text-blue-700">
        22:00
        <span class="opacity-70">· 睡前时段</span>
        <span class="ml-0.5 cursor-pointer hover:opacity-70">×</span>
      </span>
    </div>

  </div>
</body>
</html>
