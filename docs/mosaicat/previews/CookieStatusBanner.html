<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CookieStatusBanner Preview</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>body { margin: 0; padding: 16px; background: #f8fafc; font-family: system-ui, sans-serif; }</style>
</head>
<body>
  <div class="max-w-3xl mx-auto space-y-2">
    <!-- Alert 1: Expired -->
    <div class="rounded-xl border border-red-200 bg-red-50 px-4 py-3">
      <div class="flex items-center justify-between gap-3">
        <div class="flex items-center gap-3 min-w-0">
          <div class="shrink-0">
            <svg class="h-5 w-5 text-red-500" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
            </svg>
          </div>
          <div class="min-w-0">
            <p class="text-sm font-medium text-red-800 truncate">
              美妆日记
              <span class="ml-1.5 text-xs font-normal text-red-600">Cookie 已失效，无法执行发布任务</span>
            </p>
          </div>
        </div>
        <div class="flex items-center gap-2 shrink-0">
          <button class="rounded-lg bg-red-600 px-3 py-1.5 text-xs font-medium text-white hover:bg-red-700 transition-colors">
            重新登录
          </button>
          <button class="rounded-lg p-1 text-red-400 hover:text-red-600 hover:bg-red-100 transition-colors">
            <svg class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" />
            </svg>
          </button>
        </div>
      </div>
    </div>

    <!-- Alert 2: Expired -->
    <div class="rounded-xl border border-red-200 bg-red-50 px-4 py-3">
      <div class="flex items-center justify-between gap-3">
        <div class="flex items-center gap-3 min-w-0">
          <div class="shrink-0">
            <svg class="h-5 w-5 text-red-500" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
            </svg>
          </div>
          <div class="min-w-0">
            <p class="text-sm font-medium text-red-800 truncate">
              穿搭种草
              <span class="ml-1.5 text-xs font-normal text-red-600">Cookie 即将过期，请尽快更新</span>
            </p>
          </div>
        </div>
        <div class="flex items-center gap-2 shrink-0">
          <button class="rounded-lg bg-red-600 px-3 py-1.5 text-xs font-medium text-white hover:bg-red-700 transition-colors">
            重新登录
          </button>
          <button class="rounded-lg p-1 text-red-400 hover:text-red-600 hover:bg-red-100 transition-colors">
            <svg class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" />
            </svg>
          </button>
        </div>
      </div>
    </div>

    <!-- Alert 3: Single -->
    <div class="mt-8 pt-6 border-t border-gray-200">
      <p class="text-sm text-gray-500 mb-3">单条告警样式：</p>
      <div class="rounded-xl border border-red-200 bg-red-50 px-4 py-3">
        <div class="flex items-center justify-between gap-3">
          <div class="flex items-center gap-3 min-w-0">
            <div class="shrink-0">
              <svg class="h-5 w-5 text-red-500" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
              </svg>
            </div>
            <div class="min-w-0">
              <p class="text-sm font-medium text-red-800 truncate">
                生活好物分享
                <span class="ml-1.5 text-xs font-normal text-red-600">Cookie 已失效，3 条待发布任务已暂停</span>
              </p>
            </div>
          </div>
          <div class="flex items-center gap-2 shrink-0">
            <button class="rounded-lg bg-red-600 px-3 py-1.5 text-xs font-medium text-white hover:bg-red-700 transition-colors">
              重新登录
            </button>
            <button class="rounded-lg p-1 text-red-400 hover:text-red-600 hover:bg-red-100 transition-colors">
              <svg class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" />
              </svg>
            </button>
          </div>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
