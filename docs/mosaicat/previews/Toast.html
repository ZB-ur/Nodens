<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Toast Preview</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { margin: 0; padding: 16px; background: #f8fafc; font-family: system-ui, sans-serif; }
  </style>
</head>
<body>
  <div class="space-y-6 max-w-lg mx-auto">
    <h2 class="text-lg font-semibold text-gray-900">Toast</h2>

    <!-- Success -->
    <div class="flex items-center gap-3 rounded-xl border px-4 py-3 shadow-md bg-emerald-50 border-emerald-200" role="alert">
      <span class="flex h-6 w-6 shrink-0 items-center justify-center rounded-full text-white text-xs bg-emerald-500">✓</span>
      <p class="text-sm font-medium text-emerald-800">笔记发布成功！</p>
      <button class="ml-auto shrink-0 text-sm opacity-60 hover:opacity-100 text-emerald-800">✕</button>
    </div>

    <!-- Error -->
    <div class="flex items-center gap-3 rounded-xl border px-4 py-3 shadow-md bg-red-50 border-red-200" role="alert">
      <span class="flex h-6 w-6 shrink-0 items-center justify-center rounded-full text-white text-xs bg-red-500">✕</span>
      <p class="text-sm font-medium text-red-800">Cookie 已失效，请重新导入</p>
      <button class="ml-auto shrink-0 text-sm opacity-60 hover:opacity-100 text-red-800">✕</button>
    </div>

    <!-- Warning -->
    <div class="flex items-center gap-3 rounded-xl border px-4 py-3 shadow-md bg-amber-50 border-amber-200" role="alert">
      <span class="flex h-6 w-6 shrink-0 items-center justify-center rounded-full text-white text-xs bg-amber-500">⚠</span>
      <p class="text-sm font-medium text-amber-800">Cookie 即将过期，请尽快更新</p>
      <button class="ml-auto shrink-0 text-sm opacity-60 hover:opacity-100 text-amber-800">✕</button>
    </div>

    <!-- Info -->
    <div class="flex items-center gap-3 rounded-xl border px-4 py-3 shadow-md bg-blue-50 border-blue-200" role="alert">
      <span class="flex h-6 w-6 shrink-0 items-center justify-center rounded-full text-white text-xs bg-blue-500">ℹ</span>
      <p class="text-sm font-medium text-blue-800">文案生成完成，已保存至草稿箱</p>
      <button class="ml-auto shrink-0 text-sm opacity-60 hover:opacity-100 text-blue-800">✕</button>
    </div>
  </div>
</body>
</html>
