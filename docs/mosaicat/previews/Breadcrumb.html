<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Breadcrumb Preview</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { margin: 0; padding: 16px; background: #f8fafc; font-family: system-ui, sans-serif; }
  </style>
</head>
<body>
  <div class="space-y-6 max-w-lg mx-auto">
    <h2 class="text-lg font-semibold text-gray-900">Breadcrumb</h2>

    <!-- 2-level -->
    <div class="space-y-3">
      <p class="text-sm font-medium text-gray-600">2 Levels</p>
      <div class="bg-white rounded-xl border border-gray-200 p-4">
        <nav aria-label="Breadcrumb" class="flex items-center gap-1.5 text-sm">
          <a href="#" class="text-gray-500 hover:text-blue-600 transition-colors truncate">Dashboard</a>
          <svg class="h-4 w-4 shrink-0 text-gray-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7" />
          </svg>
          <span class="font-medium text-gray-900 truncate">账号管理</span>
        </nav>
      </div>
    </div>

    <!-- 3-level -->
    <div class="space-y-3">
      <p class="text-sm font-medium text-gray-600">3 Levels</p>
      <div class="bg-white rounded-xl border border-gray-200 p-4">
        <nav aria-label="Breadcrumb" class="flex items-center gap-1.5 text-sm">
          <a href="#" class="text-gray-500 hover:text-blue-600 transition-colors truncate">Dashboard</a>
          <svg class="h-4 w-4 shrink-0 text-gray-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7" />
          </svg>
          <a href="#" class="text-gray-500 hover:text-blue-600 transition-colors truncate">内容管理</a>
          <svg class="h-4 w-4 shrink-0 text-gray-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7" />
          </svg>
          <span class="font-medium text-gray-900 truncate">编辑草稿</span>
        </nav>
      </div>
    </div>

    <!-- In page header context -->
    <div class="space-y-3">
      <p class="text-sm font-medium text-gray-600">In Page Header Context</p>
      <div class="bg-white rounded-xl border border-gray-200 p-6 space-y-2">
        <nav aria-label="Breadcrumb" class="flex items-center gap-1.5 text-sm">
          <a href="#" class="text-gray-500 hover:text-blue-600 transition-colors truncate">Dashboard</a>
          <svg class="h-4 w-4 shrink-0 text-gray-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7" />
          </svg>
          <a href="#" class="text-gray-500 hover:text-blue-600 transition-colors truncate">发布排期</a>
          <svg class="h-4 w-4 shrink-0 text-gray-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7" />
          </svg>
          <span class="font-medium text-gray-900 truncate">排期详情</span>
        </nav>
        <h1 class="text-2xl font-bold text-gray-900">排期详情</h1>
        <p class="text-sm text-gray-600">查看和管理排期任务的详细信息</p>
      </div>
    </div>
  </div>
</body>
</html>
