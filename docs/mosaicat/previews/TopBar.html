<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TopBar Preview</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { margin: 0; padding: 0; background: #f8fafc; font-family: system-ui, -apple-system, sans-serif; }
  </style>
</head>
<body>

  <header class="sticky top-0 z-30 w-full">
    <!-- Alert Banner: Error -->
    <div class="bg-red-50 border-red-200 border-b px-4 py-2.5 flex items-center justify-between gap-3">
      <div class="flex items-center gap-2.5 min-w-0">
        <span class="text-sm flex-shrink-0">🔴</span>
        <p class="text-sm font-medium text-red-800 truncate">账号「美妆达人小红」Cookie 已失效，请重新导入</p>
      </div>
      <div class="flex items-center gap-2 flex-shrink-0">
        <button class="text-xs font-semibold text-red-800 hover:underline">处理</button>
        <button class="text-red-800 opacity-60 hover:opacity-100 transition-opacity p-0.5">
          <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" />
          </svg>
        </button>
      </div>
    </div>

    <!-- Alert Banner: Warning -->
    <div class="bg-amber-50 border-amber-200 border-b px-4 py-2.5 flex items-center justify-between gap-3">
      <div class="flex items-center gap-2.5 min-w-0">
        <span class="text-sm flex-shrink-0">⚠️</span>
        <p class="text-sm font-medium text-amber-800 truncate">账号「生活分享家」Cookie 即将过期，建议尽快更新</p>
      </div>
      <div class="flex items-center gap-2 flex-shrink-0">
        <button class="text-xs font-semibold text-amber-800 hover:underline">处理</button>
        <button class="text-amber-800 opacity-60 hover:opacity-100 transition-opacity p-0.5">
          <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" />
          </svg>
        </button>
      </div>
    </div>

    <!-- Alert Banner: Info -->
    <div class="bg-blue-50 border-blue-200 border-b px-4 py-2.5 flex items-center justify-between gap-3">
      <div class="flex items-center gap-2.5 min-w-0">
        <span class="text-sm flex-shrink-0">ℹ️</span>
        <p class="text-sm font-medium text-blue-800 truncate">3 篇笔记发布失败，请检查发布日志</p>
      </div>
      <div class="flex items-center gap-2 flex-shrink-0">
        <button class="text-xs font-semibold text-blue-800 hover:underline">处理</button>
        <button class="text-blue-800 opacity-60 hover:opacity-100 transition-opacity p-0.5">
          <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" />
          </svg>
        </button>
      </div>
    </div>

    <!-- Main Top Bar -->
    <div class="bg-white border-b border-gray-200 px-6 py-3 flex items-center justify-between">
      <!-- Left: Logo & Title -->
      <div class="flex items-center gap-3">
        <div class="w-8 h-8 bg-blue-600 rounded-lg flex items-center justify-center">
          <span class="text-white font-bold text-sm">M</span>
        </div>
        <h1 class="text-lg font-semibold text-gray-900">Mosaicat</h1>
      </div>

      <!-- Center: Alert summary badge -->
      <div class="hidden md:flex items-center gap-1.5 px-3 py-1 bg-slate-50 rounded-lg">
        <span class="inline-flex items-center gap-1 text-xs font-medium text-red-600">
          <span class="w-1.5 h-1.5 rounded-full bg-red-500"></span>
          1 错误
        </span>
        <span class="inline-flex items-center gap-1 text-xs font-medium text-amber-600 ml-2">
          <span class="w-1.5 h-1.5 rounded-full bg-amber-500"></span>
          1 警告
        </span>
      </div>

      <!-- Right: User info -->
      <div class="flex items-center gap-3">
        <!-- Notification bell -->
        <button class="relative p-2 text-gray-400 hover:text-gray-600 hover:bg-slate-50 rounded-lg transition-colors">
          <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
            <path stroke-linecap="round" stroke-linejoin="round" d="M14.857 17.082a23.848 23.848 0 005.454-1.31A8.967 8.967 0 0118 9.75v-.7V9A6 6 0 006 9v.75a8.967 8.967 0 01-2.312 6.022c1.733.64 3.56 1.085 5.455 1.31m5.714 0a24.255 24.255 0 01-5.714 0m5.714 0a3 3 0 11-5.714 0" />
          </svg>
          <span class="absolute top-1.5 right-1.5 w-2 h-2 bg-red-500 rounded-full"></span>
        </button>

        <!-- Divider -->
        <div class="w-px h-6 bg-gray-200"></div>

        <!-- User avatar & name -->
        <div class="flex items-center gap-2.5 cursor-pointer hover:bg-slate-50 rounded-lg px-2 py-1.5 transition-colors">
          <div class="w-8 h-8 rounded-full bg-gradient-to-br from-blue-500 to-blue-600 flex items-center justify-center">
            <span class="text-white text-sm font-medium">运</span>
          </div>
          <div>
            <p class="text-sm font-medium text-gray-900 leading-tight">运营小助手</p>
            <p class="text-xs text-gray-400 leading-tight">管理员</p>
          </div>
          <svg class="w-4 h-4 text-gray-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M19.5 8.25l-7.5 7.5-7.5-7.5" />
          </svg>
        </div>
      </div>
    </div>
  </header>

  <!-- Page content placeholder to show sticky behavior -->
  <div class="p-6 max-w-4xl mx-auto space-y-4">
    <div class="bg-white rounded-xl border border-gray-200 shadow-sm p-6">
      <p class="text-gray-400 text-sm">页面内容区域...</p>
    </div>
  </div>

</body>
</html>
